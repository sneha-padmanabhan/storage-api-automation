name: API Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: FakeStoreAPI cart suite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Pure API tests use Playwright's request fixture — no browsers required.
      - name: Run tests
        run: npx playwright test

      - name: Upload HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
